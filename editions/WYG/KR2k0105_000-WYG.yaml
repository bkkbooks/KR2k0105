body:
  text: 荆楚嵗時記地理類八雜記之屬提要臣等謹案荆楚嵗時記一卷舊本題晉宗懍撰書録解題作梁人考梁書元帝本紀載承聖三年秋七月甲辰以都官尚書宗懍為吏部尚書又南史元帝本紀載武陵之平議者欲因其舟艦遷都建業宗懍黄羅漢皆楚人不願移此書皆記楚俗當即其人舊本題晉人誤也唐宋志皆作一卷與今本合而通考乃作四巻考書録解題載懍自序曰傅元之朝會杜篤之上己安仁秋興之叙君道娯蜡之述其屬辭則已洽其比事則未宏率為小記以録荆楚嵗時風物故事自元日至除日凡二十餘事然則必無四巻知通考為𫝊寫之譌又檢今本實有三十六事併知陳振孫所記懍序亦以三字訛為二然周密癸辛襍識引張騫乗槎之天河見織女得支機石事云出荆楚嵗時記今本無之則三十六事尚非完本也其註相𫝊為隋杜公瞻作故多引開皇中杜臺卿玉燭寳典然唐志宗懍荆楚嵗時記一巻下又出杜公瞻荆楚嵗時記二巻豈原書一巻公瞻所註分二卷後人又合之歟乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書荆楚嵗時記梁宗懍撰正月一日是三元之日也謂之端月按史記云正月為端月春秋傳曰履端于始元始也雞鳴而起按周易緯通卦騐云雞陽鳥也以為人候四時使人得以翹首結帶正衣裳也注云禮内則云子事父母婦事舅姑雞初鳴咸盥潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶吊官有朝賀私有祭享䖍恭宜早復位於餘辰所以標而異焉先於庭前爆竹以辟山臊惡鬼按神異經云西方山中有人焉其長尺餘一足性不畏人犯之則令人寒熱名曰山臊人以竹著火中烞音朴熚音必有聲而山臊驚憚逺去𤣥黄經所謂山㺐鬼也俗人以為爆竹燃草起扵庭燎家國不應濫于王者帖畫雞或斵鏤五采及土雞於户上造桃板著户謂之仙朩繪二神貼户左右左神荼右鬱壘俗謂之門神按莊周云有掛雞於户懸葦索扵其上挿桃符於旁百鬼畏之又魏時人問議郎董勛云今正臘旦門前作烟火桃神絞索松栢殺雞著門户逐疫禮歟勛答曰禮十二月索室逐疫釁門户磔雞熯火行故作助行氣桃鬼所惡畫作人首可以有所收縛不死之祥又桃者五行之精能制百鬼謂之仙朩括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照則鳴下有二神一名鬱一名壘并執葦索以伺不祥之鬼則殺之即無神荼之名應劭風俗通曰黄帝書稱上古之時有神荼鬱壘兄弟二人住度朔山上桃樹下簡百鬼鬼妄搰人援以葦索執以食虎於是縣官以臘除夕飾桃人垂葦索畫虎於門效前事也於是長㓜悉正衣冠以次拜賀進椒柏酒飲桃湯進屠蘇酒膠牙􅄳下五辛盤進敷于散服却鬼丸各進一雞子凡飲酒次第從小起梁有天下不食葷荆自此不復食雞子以從常則按四民月令云過臘一日謂之小嵗拜賀君親進椒酒從小起椒是玉衡星精服之令人身輕能讀作耐老柏是仙藥成公子安椒華銘曰肇惟嵗首月正元日厥味惟珍蠲除百疾是知小嵗則用之漢朝元正則行之典術云桃者五行之精厭伏邪氣制百鬼也董勛云俗有嵗首酌椒酒而飲之以椒性芬香又堪為藥故此日採椒花以貢尊者飲之亦一時之禮也又晉海四令問勛曰俗人正日飲酒先飲小者何也勛曰俗云小者得嵗先酒賀之老者失嵗故後飲酒周處風土記曰元日造五辛盤正月元日五薫鍊形注五辛所以發五藏之氣即大蒜小蒜韭菜雲臺胡荽是也莊子所謂春正月飲酒茹葱以通五藏也又食醫心鏡曰食五辛以辟厲氣敷于散出葛洪煉化篇方用柏子仁麻仁細辛乾薑附子等分為散井華水服之又天醫方序云江夏劉次卿見鬼以正旦至市見一書生入市衆鬼悉避劉問書生曰子有何術以至扵此書生言我本無術出之日家師以一丸藥絳囊裹之令以繫臂防惡氣耳於是劉就書生借此藥至所見諸鬼處諸鬼悉走所以世俗行之其方用武都雄黄丹散二兩蠟和調如彈丸正月旦令男左女右帶之周處風土記曰正旦當吞生雞子一枚謂之鍊形膠牙者葢以使其牢固不動取膠固之義今北人亦如之獒麻子大豆兼糖散之按錬化篇云正月旦吞雞子赤豆各七枚辟瘟氣又肘後方云旦及七日吞麻子小豆各二七枚消疾疫張仲景方云嵗有惡氣中人不幸便死取大豆二七枚雞子白麻子并酒吞之然麻豆之設當起於此又以錢貫繫杖脚迴以投糞掃上云令如願按錄異記云有商人區一作歐明者過彭澤湖有車馬出自稱青湖君要明過家厚禮之問何所湏有人教明但乞如願及問以此言答青湖君甚惜如願不得已許之乃一少婢也青湖君語明曰君領取至家如要物但就如願所湏皆得自爾商人或有所求如願並為即得數年遂大富後至正旦如願起晚商人以杖打之如願以頭鑽入糞中漸沒失所後商人家漸貧今北人正旦夜立於糞掃邉令人執杖打糞堆以答假痛又以細繩繫偶人投糞掃中云令如願意者亦為如願故事耳正月七日為人日以七種菜為羮剪綵為人或鏤金箔為人以貼屏風亦戴之頭鬢又造華勝以相遺登髙賦詩按董勛問禮俗云正月一日為雞二日為狗三日為羊四日為猪五日為牛六日為馬七日為人以隂晴占豐耗正旦畫雞於門七日貼人於帳今一日不殺雞二日不殺狗三日不殺羊四日不殺猪五日不殺牛六日不殺馬七日不行刑亦此義也古乃磔雞令畏鬼今則不殺未知孰是荆人於此日向辰門前呼牛羊雞畜令来乃置粟豆於灰散之宅内云以招牛馬未知所出劉臻妻陳氏進見儀曰七日上人勝于人董勛曰人勝者或剪綵或鏤金箔為之貼扵屏風上亦戴之像人入新年形容改從新也華勝起於晉代見賈充李夫人典戒云像瑞圖金勝之形又取像西王母正月七日戴勝見武帝於承華殿也舊以正月七日為人故名人日剪綵鏤金箔為人皆符人日之意與正旦鏤雞於户同今北人又有至人日諱食故嵗菜惟食新嵗菜者與楚諱食鷄正相反又餘日不刻牛羊猪犬馬之像而二日獨施人雞此則未喻郭緣生述征記云魏東平王翕七日登夀張縣安仁山鑿山頂為㑹望處刻銘於壁文字猶在銘云正月七日厥日為人䇿我良駟陟彼安仁老子云衆人熈熈如登春臺楚詞云目極千里傷春心則春日登臨自古為適但不知七日竟起何代晉代桓温㕘軍張望亦有正月七日登髙詩近代以来南北同耳北人此日食煎餅扵庭中作之云薫天未知所出也立春之日悉剪綵為鷰以戴之貼宜春二字按綵鷰即合歡羅勝鄭毅夫云漢殿鬭簮雙綵鷰併知春色上釵頭宜春二字𫝊咸鷰賦有其言矣賦曰四時代至敬逆其始彼應運於東方乃設鷰以迎至翬輕翼之岐岐若將飛而未起何夫人之功巧式儀刑之有似御青書以賛時著宜春之嘉祉為施鈎之戱以緶作篾䌫相罥綿亘數里鳴皷牽之按施鈎之戱求諸外典未有前事公輸自逰楚為載舟之戱退則鈎之進則强之名曰鈎强遂以鈎為戱意起於此湼槃經曰鬭輪罥索其外國之戱乎今鞦韆亦施鈎之類也施或作拖又為打毬鞦韆之戱按劉向别錄曰寒食蹴鞠黄帝所造本兵勢也或云起於戰國案鞠與毬同古人蹋蹴以為戯也古今藝術圖云鞦韆本北方山戎之戯以習輕趫者後中國女子學之乃以綵繩懸木立架士女炫服坐立其上推引之名曰鞦韆楚俗亦謂之施鈎湼槃經謂之罥索正月十五日作豆糜加油膏其上以祠門户按齊諧記曰正月半有神降陳氏之宅云是蠶室若能見祭當令蠶桑百倍疑非其事祭門備之七祠今州里風俗是一作望日祠門户其法先以楊枝挿於左右門上隨楊枝所指乃以酒脯飲食及豆粥餻糜挿箸而祭之續齊諧記曰吴縣張成夜起忽見一婦人立於宅東南角舉手招成成即就之謂成曰此地是君家蠶室我即此地之神明年正月半宜作白粥泛膏於上以祭我當令君蠶桑百倍言訖而去遂失所在成如言為作膏粥自此以後年年大得蠶今世人正月十五日作粥禱之加以肉覆其上登屋食之咒曰登髙糜挾䑕腦欲来不来待我三蠶老則是為蠶逐䑕矣與齊記相似又覆肉亦是覆膏之理石虎鄴中記正月十五日有登髙之會則登髙又非今世而然者也其夕迎紫姑以卜將来蠶桑并占衆事按劉敬叔異苑云紫姑本人家妾為大婦所妬正月十五日感激而死故世人作其形迎之咒云子胥不在云是其婿曹夫人巳行云是其婦小姑可出於厠邉或猪欄邉迎之捉之覺重是神来也平原孟氏恒不信嘗以此日迎之遂穿屋而去自爾厠中著以敗衣蓋為此也洞覽云是帝嚳女將死云生平好樂至正月半可以衣見迎又其事也雜五行書厠神名後帝異苑云陶侃如厠見人自云後帝著單衣平上幘謂侃曰三年莫説貴不可言將後帝之靈慿紫姑而言乎俗云溷厠之間必湏静然後致紫姑正月未日夜蘆苣火照井厠中則百鬼走元日至于月晦並為酺聚飲食士女泛舟或臨水宴會行樂飲酒按每月皆有弦朢晦朔以正月為初年時俗重之以為節也玉燭寳典曰元日至月晦人並酺食渡水士悉湔裳酹酒於水湄以為度厄今世人唯晦日臨河解除婦人或湔裙又是月民並脯食原闕之名又似之矣出錢為醵出食為脯竟分明擲盧名為博射藝經為擲博晦日送窮按金谷園記云髙陽氏子瘦約好衣敝食糜人作新衣與之即裂破以火燒穿着之宮中號曰窮子正月晦日巷死今人作糜棄破衣是日祀於巷曰送窮鬼二月八日釋氏下生之日迦文成道之時信捨之家建八闗齋戒車輪寳葢七變八會之燈平旦執香花遶城一匝謂之行城按本起經云二月八日夜淨居諸天共白太子今者正是出家之時車匿自覺揵陟不復噴鳴太子放身光明獅子吼言諸佛出家之法我亦如是諸天捧馬四足并接車匿釋提柜因執葢北門自開諸天歌讚至於天曉行巳三踰闍那又本行經云鬼星巳與月合帝釋諸天唱言時至太子聞巳以手拔髪令寤諸天捧馬足出至聞王内則行城中矣故今二月八日平旦執香行城一匝葢起於此又阿那經云二月八日當行八闗之戒又佛經云在家菩薩此日當行八闗之齋戒春分日民並種戒火草於屋上有鳥如烏先雞而鳴架架格格民候此鳥則入田以為候社日四隣並結宗㑹社宰牲牢為屋於樹下先祭神然後享其胙按鄭氏云百家共一社今百家所立社宗即共立社之為也去冬節一百五日即有疾風甚雨謂之寒食禁火三日造􅄳大麥粥按厯合在清明前二日亦有去冬至一百六日者介子推三月五日為火所焚國人哀之每嵗暮春為不舉火謂之禁煙犯之則雨雹傷田陸翽鄴中記曰寒食三日為醴酪又煑糯米及麥為酪𢷬杏仁煑作粥玉燭寳典曰今人悉為大麥粥研杏仁為酪引􅄳沃之孫楚祭子推文云黍飯一盤醴酪一盂清泉甘水充君之厨今寒食有杏酪麥粥即其事也舊俗以介推焚骸有龍忌之禁至其月咸言神靈不樂舉火後漢周舉為并州刺史移書於介推廟云春中食寒一月老小不堪今則三日而已謂冬至後一百四日一百五日一百六日也琴操曰晉文公與介子綏俱亡子綏割股以啖文公文公復國子綏獨無所得子綏作龍蛇之歌而隠文公求之不肯出乃燔左右朩子綏抱朩而死文公哀之令人五月五日不得舉火又周舉移書及魏武明罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏即介推也又云五月五日與今有異皆因流俗所傳據左傳及史記並無介推被焚之事周禮司烜氏仲春以朩鐸修火禁扵國中注云為季春將出火也今寒食凖節氣是仲春之末清明是三月之初然則禁火蓋周之舊制也寒食挑菜按如今人春日食生菜鬭雞鏤雞子鬭雞子按玉燭寳典曰此節城市尤多鬭雞之戱左傳有季郈鬭雞其来逺矣古之豪家食稱畫卵今代猶染藍茜雜色仍加雕鏤遞相餉遺或置盤俎管子曰雕卵然食之所以發積藏散萬物張衡南都賦曰春卵夏筍秋韭冬菁便是補益滋味其鬭卵則莫知所出董仲舒書云心如宿卵為體内藏以據其剛髣髴鬭理也三月三日四民並出江渚池沼間臨清流為流觴曲水之飲按韓詩云唯溱與洧方洹洹兮唯士與女方秉蕳兮注謂今三月桃花水下以招魂續魄袚除嵗穢周禮女巫嵗時祓除釁浴鄭注云今三月上巳水上之類司馬彪禮儀志曰三月上已官民並禊飲於東流水上彌騐此日南岳記云其山西曲水壇水從石上行士女臨河一作行壇三月三日所逍遙處續齊諧記晉武帝問尚書摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為怪乃相與擕酒至東流水邉洗滌去災遂因流水以泛觴曲水之義起於此也帝曰若如所談便非嘉事尚書郎束晢曰摯虞小生不足以知此臣請説其始昔周公卜城洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王三月上巳置酒河曲有金人自東而出奉水心劒曰令君制有西夏及秦霸諸侯乃因其處立為曲水二漢相沿皆為盛事帝曰善賜金五十斤左遷摯虞為陽城令周處吳徽注呉地記則又引郭虞三女並以元巳日死故臨水以消災所未詳也張景陽洛禊賦則洛水之遊𫝊長虞神全文乃園池之宴孔子暮春浴乎沂則水濵禊祓由来逺矣是日取黍麴菜汁作􅃵以蜜和粉謂之龍舌䉽以厭時氣四月有鳥名獲榖其名自呼農人候此鳥則犂杷上岸按爾雅云鳲鳩鴶鞠郭璞云今布榖也江東呼獲榖崔寔正論云夏扈趍耕鋤即竊脂𤣥鳥鳴獲榖則其夏扈也四月八日諸寺設齋以五色香水浴佛共作龍華㑹按髙僧𫝊四月八日浴佛以都梁香為青色水鬱金香為赤色水丘隆香為白色水附子香為黄色水安息香為黒色水以灌佛頂四月十五日僧尼就禪刹掛塔謂之結夏又謂之結制按夏乃長養之節在外行則恐傷草朩蟲類故九十日安居禪苑宗規云祝融在候炎帝司方當法王禁足之辰是釋子䕶生之日至七月十五日應禪寺掛搭僧尼盡皆散去謂之解夏又謂之解制禪苑宗規云金風漸漸玉露瀼瀼當覺皇解制之辰是法嵗周圓之日大藏經云四月十五坐樹下至七月十五日僧尼坐草為一嵗禪談語錄謂之法嵗五月俗稱惡月多禁忌曝牀薦席及忌葢屋按異苑云新野庾寔嘗以五月曝席忽見一小兒死在席上俄而失之其後寔子遂亡或始於此風俗通曰五月上屋令人頭秃或問董勛曰俗五月不上屋云五月人或上屋見影魂便去勛答曰葢秦始皇自為之禁夏不得行漢魏未改案月令仲夏可以居髙明可以逺眺望可以升山􅁜可以處臺榭鄭𤣥以為順陽在上也今云不得上屋正與禮反敬叔云見小兒死而禁暴席何以異此乎俗人月諱何代無之但當矯之歸於正耳五月五日謂之浴蘭節四民並蹋百草之戯採艾以為人懸門户上以禳毒氣以菖蒲或鏤或屑以泛酒按大戴禮曰五月五日蓄蘭為沐浴楚辭曰浴蘭湯兮沐芳華今謂之浴蘭節又謂之端午蹋百草即今人有鬭百草之戱也宗則字文度常以五月五日雞未鳴時採艾見似人處攬而取之用灸有騐師曠占曰嵗多病則病草先生艾是也今人以艾為虎形或剪綵為小虎粘艾葉以戴之是日競渡採雜藥按五月五日競渡俗為屈原投汨羅日傷其死所故並命舟檝以拯之舸舟取其輕利謂之飛鳬一自以為水車一自以為水馬州將及土人悉臨水而觀之葢越人以舟為車以楫為馬也邯鄲淳曹娥碑云五月五日時迎伍君逆濤而上為水所淹斯又東吴之俗事在子胥不闗屈平也越地傳云起於越王勾踐不可詳矣是日競採雜藥夏小正云此日蓄藥以蠲除毒氣以五綵絲繫臂名曰辟兵令人不病瘟又有條逹等織組雜物以相贈遺取鴝鵒教之語按孝經援神契曰仲夏蠒始出婦人染練咸有作務日月星辰鳥獸之狀文繡金縷貢獻所尊一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱一作百索名擬甚多赤青白黒以為四方黄居中央名曰襞方綴於胸前以示婦人蠶功也詩云繞臂雙條逹是也或問辟五兵之道抱朴子曰以五月五日作赤靈符著心前今釵頭符是也此月鴝鵒子羽毛新成俗好登巢取養之必先剪去舌尖以教其語夏至節日食糉按周處風土記謂為角黍人並以新竹為筒糉楝葉挿五綵繫臂謂為長命縷是日取菊為灰以止小麥蠧按千寳變化論云朽稻成蟲朽麥為蛺蝶此其騐乎六月必有三時雨田家以為甘澤邑里相賀曰賀嘉雨伏日並作湯餅名為辟惡餅按魏氏春秋何晏以伏日食湯餅取巾拭汗面色皎然乃知非傅粉則伏日湯餅自魏以来有之七月七日為牽牛織女聚㑹之夜按戴徳夏小正云是月織女東向葢言星也春秋斗運樞云牽牛神名畧石氏星經云牽牛名天闗佐助期云織女神名收隂史記天官書云是天帝外孫𫝊𤣥擬天問云七月七日牽牛織女㑹天河此則其事也舊説天河與海通近世有人居海渚者每年八月有浮槎去来不失期人有竒志立飛閣於槎上多齎粮乗槎而去十餘月至一處有城郭狀屋舍甚嚴遙望宮中有織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人為説来意并問此是何處答曰君還至蜀都訪嚴君平則知之竟不上岸因還如期後至蜀問君平君平曰某年某月有客星犯牽牛宿計年月正此人到天河時也牽牛星荆州呼為河鼓主闗梁織女則主𤓰菓嘗見道書云牽牛娶織女借天帝二萬錢下禮久不還被驅在營室中河鼓黄姑牽牛也皆語之轉是夕人家婦女結綵縷穿七孔針或以金銀鍮石為針陳几筵酒脯𤓰菓於庭中以乞巧有蟢子網於𤓰上則以為符應按世王𫝊曰竇后少小頭秃不為家人所齒遇七月七日夜人皆㸔織女獨不許后出乃有神光照室為后之瑞宋孝武七夕詩云迎風被綵縷向月貫𤣥針是也周處風土記曰七月七日其夜灑掃庭中露施几筵設酒脯時菓散香粉於筵上以祀河鼓即牽牛也織女言此二星神當會守夜者咸懐私願或云見天漢中有奕奕白氣或光耀五色以為徵應便拜得福然則中庭祈願其舊俗乎七月十五日僧尼道俗悉營盆供諸佛按盂蘭盆經云有七葉功徳並幡花歌鼓果食送之葢由此也經又云目連見其亡母生餓鬼中即以缽盛飯徃餉其母食未入口化成火炭遂不得食目連大呌馳還白佛佛言汝母罪重非汝一人所奈何當湏十方衆僧威神之力至七月十五日當為七代父母厄難中者具百味五菓以著盆中供養十方大徳佛勅衆僧皆為施主祝願代七代父母行禪定意然後受食是時目連母得脱一切餓鬼之苦目連白佛未来世佛弟子行孝順者亦應奉盂蘭盆供養佛言大善故後人因此廣為華飾乃至刻朩割竹飴蠟剪綵模花葉之形極工妙之巧八月雨謂之荳花雨八月十四日民並以朱墨㸃小兒頭額名為天灸以壓疾又以錦綵為眼明囊逓相遺餉按述征記云八月一日作五明囊盛取百草頭露洗眼令眼明也續齊諧記云宏農鄧紹嘗以八月旦入華山採藥見一童子執五綵囊承柏葉上露皆如珠滿囊紹問用此何為答曰赤松先生取以明目言終便失所在今世人八月旦作眼明袋此遺象也或以金箔為之逓相餉焉九月九日四民並藉野飲宴按杜公瞻云九月九日宴會未知起扵何代然自漢至宋未改今北人亦重此節佩茱茰食餌飲菊花酒云令人長夀近代皆設宴於臺榭又續齊諧記云汝南桓景隨費長房逰學長房謂之曰九月九日汝家中當有災厄急令家人縫囊盛茱茰繫臂上登山飲菊花酒此禍可消景如言舉家登山夕還見雞犬牛羊一時暴死長房聞之曰此可代也今世人九日登髙飲酒婦人帶茱茰囊葢始於此十月朔日黍臛俗謂之秦嵗首未詳黍臛之義今北人此日設麻羮豆飯當為其始熟嘗新耳禰衡别𫝊云十月朝黄祖在艨艟上會設黍臛是也又天氣和暖似春故曰小春仲冬之月采擷霜蕪菁葵等雜菜乾之並為鹹葅有作其和者並作金釵色今南人作鹹葅以糯米熬搗為末并研胡麻汁和釀之石窄令熟葅既甜脆汁亦酸美其莖為金釵股醒酒所宜也冬至日量日影作赤豆粥以禳疫按共工氏有不才之子以冬至死為疫鬼畏赤小豆故冬至日作赤豆粥以禳之又晉魏間宫中以紅線量日影冬至後日影添長一線十二月八日為臘日史記陳勝𫝊有臘日之言是謂此也諺言臘鼓鳴春草生村人並繫細腰鼓戴胡公頭及作金剛力士以逐疫沐浴轉除罪障按禮記云儺人所逐厲鬼也吕氏春秋季冬紀注云今日臘前一日擊皷驅疫謂之逐除晉陽秋王平子在荆州以軍圍逐除以鬭故也𤣥中記顓頊氏三子俱亡處人宫室善驚小兒漢世以五營千騎自端門𫝊炬送疫棄洛水中故東京賦云卒嵗大儺敺除羣厲方相秉鉞巫覡操茢侲子萬童丹首𤣥製桃弧棘矢所發無臬丹首帥赤幘也逐除所服宣城記云洪矩呉時作廬陵郡載土船頭逐除人就矩乞矩指船頭云無所載土耳小説孫興公常着戱頭與逐除人共至桓宣武家宣武覺其應對不凡推問乃騐也金剛力士世謂佛家之神案河圖玉版云天立四極有金剛力士兵長三十丈此則其義其日並以豚酒祭竈神按禮記云竈者老婦之祭也尊於瓶盛於盆言以瓶為罇盆盛饌也許慎五經異義云顓頊有子曰黎為祝融火正也祀以為竈神姓蘇名吉利婦姓王名摶頬漢宣帝時隂子方者至孝有仁恩嘗臘日辰炊而竈神形見子方再拜受慶家有黄犬因以祭之謂為黄羊隂氏世䝉其福俗人所競尚以此故也嵗前又為藏彄之戱始於鈎弋夫人按漢武故事云上廵狩河間見清光自地屬天望氣者云下有貴子上求之見一女子在空室中姿色殊艷兩手皆拳數百人擘之莫舒上自披即舒號拳夫人善素女術大有寵即鈎弋夫人也辛氏三秦記曰漢昭帝母鈎弋夫人手拳有國色世人藏鈎起於此鈎亦作彄周處風土記曰進清醇以告蜡竭恭敬以明祀乃有藏鉤俗呼為行彄蓋婦人所作金環以錔指而纒者臘日祭後叟嫗各隨其儕為藏鈎之戯分二曹以較勝負得一籌者為勝其負者起拜謝勝者周處成公綏並作彄字藝經庾闡則作鈎字其事同也俗云此戯令人生離有禁忌之家則廢而不修嵗暮家家具肴䔩一作核詣宿嵗之位以迎新年相聚酣飲留宿嵗飯至新年十二日則棄之街衢以為去故納新也孔子所以預以陪賓一嵗之出盛於此節閏月不舉百事按周禮云閏月王出居寢門故為閏字門中從王也是月也不舉百事以無中氣也荆楚嵗時記
